<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  </head>
  <body>
    <a-scene
      mindar-image="imageTargetSrc: ./assets/targets.mind"
      color-space="sRGB"
      renderer="colorManagement: true, physicallyCorrectLights"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
    >
      <a-assets>
        <video
          id="myVideo"
          src="https://res.cloudinary.com/dkd31l7ls/video/upload/v1778497435/%E6%BF%81%E6%B0%B4%E6%BA%AA_ar_motion_v6hhln.mp4"
          preload="auto"
          loop="true"
          response-type="arraybuffer"
          crossorigin="anonymous"
          webkit-playsinline
          playsinline
        ></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-video
          src="#myVideo"
          position="0 0 0"
          height="1.5"
          width="0.828"
          rotation="0 0 0"
        ></a-video>
      </a-entity>
    </a-scene>
    <script>
      // 3. 自動播放邏輯：當偵測到目標時播放，失去目標時暫停
      const video = document.querySelector("#myVideo");
      const target = document.querySelector("[mindar-image-target]");

      target.addEventListener("targetFound", (event) => {
        console.log("發現目標，播放影片");
        video.play();
      });

      target.addEventListener("targetLost", (event) => {
        console.log("失去目標，暫停影片");
        video.pause();
      });
    </script>
  </body>
</html>
